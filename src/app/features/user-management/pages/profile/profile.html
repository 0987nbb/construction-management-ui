<form [formGroup]="form" (ngSubmit)="save()">
  <app-form-shell
    [stickyActions]="true"
    title="My Profile"
    subtitle="Keep personal account details aligned for project communication and access."
  >
    <div form-card-body>
      <app-form-section title="Profile Information" subtitle="Editable fields are kept separate from system-managed values.">
        <div class="erp-grid">
          <div class="erp-field">
            <label for="fullName">Full Name</label>
            <input id="fullName" pInputText formControlName="fullName" />
          </div>
          <div class="erp-field">
            <label for="email">Email</label>
            <input id="email" pInputText formControlName="email" />
          </div>
          <div class="erp-field">
            <label for="role">Role</label>
            <input id="role" pInputText formControlName="role" />
          </div>
          <div class="erp-field">
            <label for="phoneNumber">Phone Number</label>
            <input id="phoneNumber" pInputText formControlName="phoneNumber" />
          </div>
        </div>
      </app-form-section>
    </div>

    <div form-card-actions class="erp-actions">
      <button pButton type="submit" label="Update Profile" icon="pi pi-check"></button>
    </div>
  </app-form-shell>
</form>
