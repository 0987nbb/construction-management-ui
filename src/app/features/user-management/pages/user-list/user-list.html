<section class="page-card p-4">
  <div class="crud-toolbar">
    <button pButton type="button" icon="pi pi-plus" label="New" (click)="openCreateDialog()"></button>
  </div>

  <div class="head-row">
    <div>
      <h2>User Management</h2>
      <p>Manage staff lifecycle and role assignments.</p>
    </div>
    <div class="search-wrap">
      <i class="pi pi-search"></i>
      <input pInputText type="text" [(ngModel)]="search" (ngModelChange)="onSearchChange()" placeholder="Search..." />
      <button pButton type="button" icon="pi pi-times" text="true" rounded="true" (click)="clearSearch()"></button>
    </div>
  </div>

  <p class="error" *ngIf="error">{{ error }}</p>

  <p-table [value]="users" [loading]="loading" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10, 20, 50]" responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-gridlines">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Onboarding</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.fullName }}</td>
        <td>{{ user.email }}</td>
        <td><p-tag [value]="user.role" severity="info"></p-tag></td>
        <td><p-tag [value]="onboardingLabel(user)" [severity]="user.mustChangePassword || user.isFirstLogin ? 'warn' : 'success'"></p-tag></td>
        <td>
          <button pButton type="button" size="small" [label]="user.isActive ? 'Active' : 'Inactive'" [severity]="user.isActive ? 'success' : 'secondary'" (click)="toggle(user)"></button>
        </td>
        <td>
          <div class="row-actions">
            <button pButton type="button" icon="pi pi-pencil" severity="secondary" outlined="true" size="small" (click)="openEditDialog(user)"></button>
            <button pButton type="button" icon="pi pi-trash" severity="danger" outlined="true" size="small" (click)="delete(user)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6">No users found.</td>
      </tr>
    </ng-template>
  </p-table>
</section>

<p-dialog
  [(visible)]="showFormDialog"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  [style]="{ width: 'min(96vw, 980px)' }"
  [contentStyle]="{ padding: '0.5rem', maxHeight: '80vh', overflow: 'auto' }"
  [header]="editingUserId ? 'Edit User' : 'Create User'"
  (onHide)="closeFormDialog()"
>
  <app-user-form
    *ngIf="showFormDialog"
    [inDialog]="true"
    [userIdInput]="editingUserId"
    (saved)="handleFormSaved()"
    (cancelled)="closeFormDialog()"
  ></app-user-form>
</p-dialog>
