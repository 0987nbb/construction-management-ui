<section class="page-card p-4">
  <div class="crud-toolbar">
    <button pButton type="button" icon="pi pi-plus" label="New" (click)="openCreateDialog()"></button>
  </div>

  <div class="head-row">
    <div>
      <h2>Client Management</h2>
      <p>Manage client accounts, status, and project linkage context.</p>
    </div>
    <div class="search-wrap">
      <i class="pi pi-search"></i>
      <input pInputText type="text" [(ngModel)]="search" (ngModelChange)="onSearchChange()" placeholder="Search..." />
      <button pButton type="button" icon="pi pi-times" text="true" rounded="true" (click)="clearSearch()"></button>
    </div>
  </div>

  <p class="error" *ngIf="error">{{ error }}</p>

  <p-table [value]="clients" [loading]="loading" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10, 20, 50]" responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-gridlines">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Company</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Projects</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-client>
      <tr>
        <td>{{ client.name }}</td>
        <td>{{ client.email }}</td>
        <td>{{ client.company }}</td>
        <td>{{ client.phone }}</td>
        <td><p-tag [value]="client.isActive ? 'Active' : 'Inactive'" [severity]="client.isActive ? 'success' : 'secondary'"></p-tag></td>
        <td>{{ client.projects.length }}</td>
        <td>
          <div class="row-actions">
            <button pButton type="button" icon="pi pi-pencil" severity="secondary" outlined="true" size="small" (click)="openEditDialog(client)"></button>
            <button pButton type="button" icon="pi pi-trash" severity="danger" outlined="true" size="small" (click)="delete(client)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7">No clients found.</td>
      </tr>
    </ng-template>
  </p-table>
</section>

<p-dialog
  [(visible)]="showFormDialog"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  [style]="{ width: 'min(96vw, 980px)' }"
  [contentStyle]="{ padding: '0.5rem', maxHeight: '80vh', overflow: 'auto' }"
  [header]="editingClientId ? 'Edit Client' : 'Create Client'"
  (onHide)="closeFormDialog()"
>
  <app-client-form
    *ngIf="showFormDialog"
    [inDialog]="true"
    [clientIdInput]="editingClientId"
    (saved)="handleFormSaved()"
    (cancelled)="closeFormDialog()"
  ></app-client-form>
</p-dialog>
