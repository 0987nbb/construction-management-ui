<section class="page-card p-4">
  <div class="head-row">
    <div>
      <h2>Client Management</h2>
      <p>Manage client accounts, status, and project linkage context.</p>
    </div>
    <a pButton routerLink="/clients/new" icon="pi pi-plus" label="Add Client"></a>
  </div>

  <div class="filter-grid">
    <input pInputText type="text" [(ngModel)]="search" placeholder="Search name, email, company, phone" />
    <p-select [options]="statusOptions" optionLabel="label" optionValue="value" [(ngModel)]="isActive"></p-select>
    <div class="actions">
      <button pButton type="button" icon="pi pi-search" label="Apply" (click)="load()"></button>
      <button pButton type="button" icon="pi pi-refresh" label="Reset" severity="secondary" outlined="true" (click)="clearFilters()"></button>
    </div>
  </div>

  <p class="error" *ngIf="error">{{ error }}</p>

  <p-table [value]="clients" [loading]="loading" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10, 20, 50]" responsiveLayout="scroll" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Company</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Projects</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-client>
      <tr>
        <td>{{ client.name }}</td>
        <td>{{ client.email }}</td>
        <td>{{ client.company }}</td>
        <td>{{ client.phone }}</td>
        <td><p-tag [value]="client.isActive ? 'Active' : 'Inactive'" [severity]="client.isActive ? 'success' : 'secondary'"></p-tag></td>
        <td>{{ client.projects.length }}</td>
        <td>
          <div class="row-actions">
            <a pButton [routerLink]="['/clients', client.id, 'edit']" icon="pi pi-pencil" severity="secondary" outlined="true" size="small"></a>
            <button pButton type="button" icon="pi pi-trash" severity="danger" outlined="true" size="small" (click)="delete(client)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7">No clients found.</td>
      </tr>
    </ng-template>
  </p-table>
</section>
