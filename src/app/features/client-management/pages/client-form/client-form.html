<form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!loading">
  <app-form-shell
    [backLink]="inDialog ? '' : '/clients'"
    backLabel="Back To Clients"
    [stickyActions]="!inDialog"
    [title]="clientId ? 'Edit Client' : 'Create Client'"
    subtitle="Maintain client records with clear account and contact hierarchy."
  >
    <div form-card-body>
      <p class="cm-form-hint" *ngIf="loading">Saving/loading...</p>
      <p class="cm-state-error" *ngIf="error">{{ error }}</p>

      <app-form-section title="Client Account" subtitle="Core identity and communication details.">
        <div class="erp-grid">
          <div class="erp-field"><label for="name">Name</label><input id="name" pInputText type="text" formControlName="name" /></div>
          <div class="erp-field"><label for="email">Email</label><input id="email" pInputText type="email" formControlName="email" /></div>
          <div class="erp-field"><label for="phone">Phone</label><input id="phone" pInputText type="text" formControlName="phone" /></div>
          <div class="erp-field"><label for="company">Company</label><input id="company" pInputText type="text" formControlName="company" /></div>
          <div class="erp-field erp-field-full"><label for="address">Address</label><input id="address" pInputText type="text" formControlName="address" /></div>
          <label class="erp-checkbox">
            <input type="checkbox" formControlName="isActive" />
            <span>Active Client</span>
          </label>
        </div>
      </app-form-section>

    </div>

    <div form-card-actions class="erp-actions">
      <button pButton type="button" severity="secondary" [outlined]="true" label="Cancel" icon="pi pi-times" (click)="onCancel()"></button>
      <button pButton type="submit" [disabled]="form.invalid" label="Save Client" icon="pi pi-check"></button>
    </div>
  </app-form-shell>
</form>
