<section class="auth-page">
  <div class="auth-card">
  <h2>Set Password</h2>
  <p>Create your account password using the invite link.</p>
  <p *ngIf="tokenValidating">Validating invite link...</p>
  <button type="button" *ngIf="tokenValidating" (click)="continueAnyway()">Continue anyway</button>
  <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!tokenValidating && (tokenIsValid || allowDirectSubmit)">
    <label>New Password<input type="password" formControlName="password" /></label>
    <label>Confirm Password<input type="password" formControlName="confirmPassword" /></label>
    <button type="submit">Set Password</button>
  </form>
  <p class="ok" *ngIf="message">{{ message }}</p>
  <p class="err" *ngIf="error">{{ error }}</p>
  <a routerLink="/login">Back to login</a>
  </div>
</section>
