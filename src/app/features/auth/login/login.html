<div class="login-container">

  <h2>Login</h2>

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="loginData.email"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="loginData.password"
  />

  <button (click)="login()">
    Login
  </button>

  <br><br>

  <a routerLink="/register">
    Go To Register
  </a>

</div>
